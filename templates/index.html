{% extends 'base.html' %}
{% block content %}
<h2>All Expenses</h2>
<table class="table table-striped">
    <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Paid By</th></tr></thead>
    <tbody>
    {% for exp in expenses %}
        <tr><td>{{ exp['created_at'] }}</td><td>{{ exp['description'] }}</td><td>₹{{ exp['amount'] }}</td><td>{{ exp['paid_by_name'] }}</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
