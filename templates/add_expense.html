{% extends 'base.html' %}
{% block content %}
<h2>Add New Expense</h2>
<form method="POST">
    <div class="mb-3"><label>Description</label><input type="text" name="description" class="form-control" required></div>
    <div class="mb-3"><label>Amount (₹)</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
    <div class="mb-3"><label>Paid By</label>
        <select name="paid_by" class="form-select">
            {% for user in users %}<option>{{ user['name'] }}</option>{% endfor %}
        </select>
    </div>
    <div class="mb-3"><label>Participants (hold Ctrl to select multiple)</label>
        <select name="participants" multiple class="form-select" size="4">
            {% for user in users %}<option>{{ user['name'] }}</option>{% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-success">Add Expense</button>
</form>
{% endblock %}
