<!DOCTYPE html>
<html>
<head>
    <title>Expense Splitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1 class="text-center mb-4">🧾 Expense Splitter (Mini Splitwise)</h1>
    <nav class="nav justify-content-center mb-4">
        <a class="nav-link btn btn-primary mx-1" href="/">Home</a>
        <a class="nav-link btn btn-success mx-1" href="/add_expense">+ Add Expense</a>
        <a class="nav-link btn btn-info mx-1" href="/balances">Balances</a>
    </nav>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-success">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
